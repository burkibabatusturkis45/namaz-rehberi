<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rota90</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#F4F8F4;
}

header{
background:#2E7D32;
color:white;
padding:25px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

header h1{
font-size:38px;
}

header p{
margin-top:8px;
opacity:.9;
}

.container{
width:90%;
max-width:900px;
margin:auto;
margin-top:35px;
}

.card{

background:white;
border-radius:22px;
padding:30px;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
cursor:pointer;

}

.card:hover{

transform:translateY(-8px);

}

.icon{

font-size:65px;
text-align:center;

}

.title{

font-size:28px;
font-weight:bold;
text-align:center;
margin-top:10px;
color:#2E7D32;

}

.progress{

margin-top:20px;

}

.bar{

width:100%;
height:18px;
background:#ddd;
border-radius:50px;
overflow:hidden;

}

.fill{

width:0%;
height:100%;
background:#43A047;
transition:1s;

}

.percent{

text-align:right;
margin-top:8px;
font-weight:bold;
color:#2E7D32;

}

button{

margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#2E7D32;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#1B5E20;

}

.bottom{

position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:18px;
box-shadow:0 -3px 15px rgba(0,0,0,.15);

}

.nav{

text-align:center;
font-size:15px;
color:#2E7D32;
cursor:pointer;

}

</style>

</head>

<body>

<header>

<h1>🌿 Rota90</h1>

<p>Her gün bir adım daha.</p>

</header>

<div class="container">

<div class="card">

<div class="icon">📿</div>

<div class="title">

90 Günlük Namaz Takibi

</div>

<div class="progress">

<div class="bar">

<div class="fill" id="namaz"></div>

</div>

<div class="percent">

0 / 90 Gün

</div>

</div>

<button>

Devam Et

</button>

</div>

<div class="card">

<div class="icon">🌙</div>

<div class="title">

30 Günlük Ramazan Takibi

</div>

<div class="progress">

<div class="bar">

<div class="fill" id="ramazan"></div>

</div>

<div class="percent">

0 / 30 Gün

</div>

</div>

<button>

Devam Et

</button>

</div>

</div>

<div class="bottom">

<div class="nav">
🏠<br>
Ana Sayfa
</div>

<div class="nav">
📊<br>
İstatistik
</div>

<div class="nav">
🎯<br>
Hedefler
</div>

<div class="nav">
⚙️<br>
Ayarlar
</div>

</div>

<script>

setTimeout(()=>{

document.getElementById("namaz").style.width="25%";

document.getElementById("ramazan").style.width="50%";

},500);

</script>

</body>

</html>
